name: 哔咔漫画每日自动签到

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Run Bika daily checkin
        env:
          BIKA_ACCOUNT: ${{ secrets.BIKA_ACCOUNT }}
          BIKA_PASSWORD: ${{ secrets.BIKA_PASSWORD }}
        run: node scripts/bika-checkin.js
